  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

        <div><div style=\"font-size: 10.5px; letter-spacing: .5px; color: rgba(237,230,214,0.42); font-weight: 700; margin-bottom: 6px;\">POTENCIAL RECUPERABLE<\u002Fdiv><div style=\"font-family: 'Source Serif 4', serif; font-size: 24px; font-weight: 600; color: rgb(159,194,142);\">+ 6,50<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size: 10.5px; letter-spacing: .5px; color: rgba(237,230,214,0.42); font-weight: 700; margin-bottom: 6px;\">PUNTUACIÓN PROYECTADA<\u002Fdiv><div style=\"font-family: 'Source Serif 4', serif; font-size: 24px; font-weight: 600; color: #E7C777;\">33,10<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size: 10.5px; letter-spacing: .5px; color: rgba(237,230,214,0.42); font-weight: 700; margin-bottom: 6px;\">UMBRAL ADJUDICACIÓN<\u002Fdiv><div style=\"font-family: 'Source Serif 4', serif; font-size: 24px; font-weight: 600; color: rgba(237,230,214,0.7);\">≥ 32.00<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ CLOSING ============ -->\n  <sc-if value=\"{{ showClosing }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background: radial-gradient(80% 60% at 50% -10%, rgb(22,36,28) 0%, rgb(11,17,14) 55%), rgb(11,17,14); animation: atl-fade .5s ease both;\">\n      <div style=\"position: relative; width: 100%; max-width: 720px; display: flex; flex-direction: column; align-items: center; gap: 30px; text-align: center;\">\n        <svg viewBox=\"0 0 100 100\" width=\"64\" height=\"64\">\n          <polygon points=\"50,5 95,90 5,90\" fill=\"#141f19\" stroke=\"#C9A24B\" stroke-width=\"2.5\"><\u002Fpolygon>\n          <polygon points=\"50,38 63,60 50,80 37,60\" fill=\"#C9A24B\"><\u002Fpolygon>\n          <polygon points=\"50,44 18,64 50,58\" fill=\"#EDE6D6\" opacity=\"0.92\"><\u002Fpolygon>\n          <polygon points=\"50,44 82,64 50,58\" fill=\"#EDE6D6\" opacity=\"0.92\"><\u002Fpolygon>\n        <\u002Fsvg>\n        <div style=\"font-family: 'Source Serif 4', serif; font-weight: 600; font-size: 34px; color: #EDE6D6;\">\"La IA del licitador\"<\u002Fdiv>\n        <div style=\"display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; width: 100%;\">\n          <div style=\"width: 200px; background: #182420; border: 1px solid rgba(237,230,214,0.10); border-radius: 14px; padding: 20px 18px;\">\n            <div style=\"font-size: 12px; letter-spacing: 2px; color: #C9A24B; font-weight: 700; margin-bottom: 8px;\">VIGILAR<\u002Fdiv>\n            <div style=\"font-size: 13px; line-height: 1.5; color: rgba(237,230,214,0.62);\">Detecta convocatorias relevantes antes de que el plazo presione.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width: 200px; background: #182420; border: 1px solid rgba(237,230,214,0.10); border-radius: 14px; padding: 20px 18px;\">\n            <div style=\"font-size: 12px; letter-spacing: 2px; color: #C9A24B; font-weight: 700; margin-bottom: 8px;\">ANALIZAR<\u002Fdiv>\n            <div style=\"font-size: 13px; line-height: 1.5; color: rgba(237,230,214,0.62);\">Convierte el pliego en un criterio GO/NO-GO en minutos, no horas.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width: 200px; background: #182420; border: 1px solid rgba(237,230,214,0.10); border-radius: 14px; padding: 20px 18px;\">\n            <div style=\"font-size: 12px; letter-spacing: 2px; color: #C9A24B; font-weight: 700; margin-bottom: 8px;\">ANTICIPAR<\u002Fdiv>\n            <div style=\"font-size: 13px; line-height: 1.5; color: rgba(237,230,214,0.62);\">Estima la puntuación técnica y dónde concentrar el esfuerzo.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size: 14px; color: rgba(237,230,214,0.5); max-width: 480px; margin: 6px 0 0;\">Piloto activo durante 2026.<\u002Fp>\n        <div style=\"display: flex; gap: 14px; margin-top: 8px;\">\n          <button onclick=\"{{ prev }}\" style=\"background: transparent; border: 1px solid rgba(237,230,214,0.2); color: #EDE6D6; border-radius: 10px; padding: 13px 22px; font-family: Manrope, sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;\">← Volver<\u002Fbutton>\n          <button onclick=\"{{ restart }}\" style=\"background: #C9A24B; color: #141f19; border: none; border-radius: 10px; padding: 13px 26px; font-family: Manrope, sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;\">Reiniciar demo<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TOUR CAPTION BAR ============ -->\n  <sc-if value=\"{{ showTourBar }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; left: 0; right: 0; bottom: 0; background: rgba(11,17,14,0.94); backdrop-filter: blur(6px); border-top: 1px solid rgba(237,230,214,0.10); padding: 18px 40px 16px; z-index: 40;\">\n      <div style=\"position: absolute; top: -1px; left: 0; height: 2px; background: #C9A24B; transition: width .4s ease; width: {{ progressPct }}\"><\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 24px; max-width: 1300px; margin: 0 auto;\">\n        <div style=\"flex-shrink: 0; font-size: 11px; letter-spacing: 1px; color: #C9A24B; font-weight: 700; width: 78px;\">{{ stepLabel }}<\u002Fdiv>\n        <div style=\"flex: 1; min-width: 0;\">\n          <div style=\"font-size: 15px; font-weight: 700; color: #EDE6D6; margin-bottom: 3px;\">{{ captionTitle }}<\u002Fdiv>\n          <div style=\"font-size: 13px; line-height: 1.45; color: rgba(237,230,214,0.6); max-width: 780px;\">{{ captionBody }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 10px; flex-shrink: 0;\">\n          <button onclick=\"{{ prev }}\" disabled=\"{{ prevDisabled }}\" style=\"background: transparent; border: 1px solid rgba(237,230,214,0.2); color: #EDE6D6; border-radius: 9px; width: 40px; height: 40px; font-size: 16px; cursor: pointer; opacity: {{ prevOpacity }}\">←<\u002Fbutton>\n          <button onclick=\"{{ next }}\" style=\"background: #C9A24B; color: #141f19; border: none; border-radius: 9px; padding: 0 20px; height: 40px; font-family: Manrope, sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;\">Siguiente →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ DOTS (standalone, cover/closing) ============ -->\n  <sc-if value=\"{{ showDotsStandalone }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; left: 0; right: 0; bottom: 22px; display: flex; justify-content: center; gap: 8px; z-index: 40;\">\n      <sc-for list=\"{{ dots }}\" as=\"d\" hint-placeholder-count=\"9\">\n        <div onclick=\"{{ d.go }}\" style=\"{{ d.style }}\"><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { step: 0 };\n\n  componentDidMount() {\n    this._onKey = (e) => {\n      if (e.key === 'ArrowRight') this.next();\n      if (e.key === 'ArrowLeft') this.prev();\n    };\n    window.addEventListener('keydown', this._onKey);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('keydown', this._onKey);\n  }\n\n  componentDidUpdate(prevProps, prevState) {\n    if (prevState.step === this.state.step) return;\n    const step = this.state.step;\n    const scrollToRef = (container, el) => {\n      if (!container || !el) return;\n      container.scrollTo({ top: Math.max(0, el.offsetTop - 24), behavior: 'smooth' });\n    };\n    if (step === 2) scrollToRef(this._dirScroll, this._kpisEl);\n    if (step === 3) scrollToRef(this._dirScroll, this._tableEl);\n    if (step === 4) scrollToRef(this._dirScroll, this._decisionsEl);\n    if (step === 5) scrollToRef(this._tecScroll, this._predictionEl);\n    if (step === 6) scrollToRef(this._tecScroll, this._criteriaEl);\n    if (step === 7) scrollToRef(this._tecScroll, this._actionplanEl);\n  }\n\n  goto(n) {\n    const step = Math.max(0, Math.min(8, n));\n    this.setState({ step });\n  }\n\n  next = () => this.goto(this.state.step + 1);\n  prev = () => this.goto(this.state.step - 1);\n  restart = () => this.goto(0);\n\n  renderVals() {\n    const step = this.state.step;\n    const glow = 'border-color: #C9A24B; box-shadow: 0 0 0 1px #C9A24B, 0 0 42px rgba(201,162,75,0.22);';\n\n    const captions = {\n      1: { t: 'Dos perfiles, una plataforma', b: 'El decisor económico necesita visión de conjunto; el técnico necesita profundidad por criterio. AtalaIA sirve a ambos sin duplicar el trabajo. Elige cualquier módulo para continuar.' },\n      2: { t: 'Interfaz PLANTA — visión ejecutiva', b: 'En segundos: cuántos pliegos se han analizado, cuántas ofertas se presentaron y qué tasa de adjudicación tiene la empresa. El coste de licitar deja de estar escondido en horas de técnicos.' },\n      3: { t: 'El historial por administración es el activo', b: 'Cada administración puntúa distinto. AtalaIA acumula ese patrón y lo traduce en una señal — favorable, neutro o desfavorable — antes de decidir presentarse.' },\n      4: { t: 'VIGILAR + ANALIZAR: GO/NO-GO en minutos', b: 'Cada convocatoria nueva llega con importe, plazo y puntuación estimada. Pulsa \"Ver informe técnico\" en Diputación Provincial para entrar al análisis detallado.' },\n      5: { t: 'Interfaz PERFIL — ANTICIPAR antes de presentar', b: '26,60 de 45 puntos posibles: por debajo del umbral histórico de adjudicación de esta administración. La alerta señala el criterio que hunde la oferta.' },\n      6: { t: 'Puntuación estimada, criterio por criterio', b: 'Cada apartado se compara con el histórico de puntuaciones de ese evaluador: el patrón real de cómo puntúa esa administración, no una lectura genérica del pliego.' },\n      7: { t: 'Plan de acción: qué argumentar y cuánto vale', b: 'Recomendaciones concretas por criterio devuelven 6,50 puntos potenciales: la oferta pasa de 26,60 a una proyección de 33,10, por encima del umbral de adjudicación.' }\n    };\n    const cap = captions[step] || { t: '', b: '' };\n\n    const dots = [0, 1, 2, 3, 4, 5, 6, 7, 8].map((i) => ({\n      idx: i,\n      go: () => this.goto(i),\n      style: i === step\n        ? 'width:22px; height:8px; border-radius:4px; background:#C9A24B; cursor:pointer; transition:all .3s ease;'\n        : 'width:8px; height:8px; border-radius:4px; background:rgba(237,230,214,0.25); cursor:pointer; transition:all .3s ease;'\n    }));\n\n    return {\n      showCover: step === 0,\n      showLogin: step === 1,\n      showDirectivo: step >= 2 && step <= 4,\n      showTecnico: step >= 5 && step <= 7,\n      showClosing: step === 8,\n      showTourBar: step >= 1 && step <= 7,\n      showDotsStandalone: step === 0 || step === 8,\n      stepLabel: 'PASO ' + (step + 1) + ' / 9',\n      captionTitle: cap.t,\n      captionBody: cap.b,\n      progressPct: Math.round((step / 8) * 100) + '%',\n      prevOpacity: step > 1 ? '1' : '0.35',\n      prevDisabled: step <= 1,\n      next: this.next,\n      prev: this.prev,\n      restart: this.restart,\n      onModuleCardClick: () => this.goto(2),\n      gotoDirectivo: () => this.goto(2),\n      gotoTecnico: () => this.goto(5),\n      onVerInformeActive: () => this.goto(5),\n      diputacionBorder: step === 4 ? '#C9A24B' : 'rgba(237,230,214,0.10)',\n      diputacionNudge: step === 4 ? 'atl-nudge 1.2s ease-in-out infinite' : 'none',\n      glowKpis: step === 2 ? glow : '',\n      glowTable: step === 3 ? glow : '',\n      glowDecisions: step === 4 ? glow : '',\n      glowPrediction: step === 5 ? glow : '',\n      glowCriteria: step === 6 ? glow : '',\n      glowActionPlan: step === 7 ? glow : '',\n      dots,\n      dirScrollRef: (el) => { this._dirScroll = el; },\n      tecScrollRef: (el) => { this._tecScroll = el; },\n      kpisRef: (el) => { this._kpisEl = el; },\n      tableRef: (el) => { this._tableEl = el; },\n      decisionsRef: (el) => { this._decisionsEl = el; },\n      predictionRef: (el) => { this._predictionEl = el; },\n      criteriaRef: (el) => { this._criteriaEl = el; },\n      actionplanRef: (el) => { this._actionplanEl = el; }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
